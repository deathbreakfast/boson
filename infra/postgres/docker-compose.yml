services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: boson
      POSTGRES_PASSWORD: bench
      POSTGRES_DB: boson_bench
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U boson -d boson_bench"]
      interval: 5s
      timeout: 5s
      retries: 5
